  <span class="fw-bold">由一种花色的147、另一花色的258、第三种花色的369、七种字牌共十六种牌中任意十四种牌各一张组成的特殊和牌型，计12番。不计五门齐，点和不计门前清，自摸不计不求人。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由单张3种花色147、258、369不能错位的序数牌及东南西北中发白中的任何14张牌组成的和牌。不计五门齐、不求人、单钓</span><br><br>
