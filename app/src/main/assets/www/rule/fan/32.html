<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>一色三步高②</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">同一种花色序数依次递增1或2的三副顺子，计16番。本APP用后缀①②表示区分。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和牌时，有一种花色3副依次递增一位或依次递增二位数字的顺子</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-1m tl-sm tl-ccw"></div></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-3m tl-sm tl-ccw"></div></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div>&nbsp;<div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div>&nbsp;<div class="tl-5s tl-sm"></div>
  </span>(点和)<br>
  计：一色三步高②、喜相逢、缺一门<br><br>
  【牌例2】<br>
  <span>
    <div class="tlw"><div class="tl-2p tl-sm tl-ccw"></div></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div>&nbsp;<div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div>&nbsp;<div class="tl-5p tl-sm"></div>
  </span>(自摸)<br>
  计：一色三步高①、混一色、连六、自摸<br><br>
  【注】<br>
  牌例2中，<div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div>&nbsp;<div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div>&nbsp;<div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div>与<div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div>&nbsp;<div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div>&nbsp;<div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div>均满足一色三步高定义，根据不相同原则，只计一色三步高&times;1，<div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div>&nbsp;<div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div>可加计连六。
</body>
