<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>七星不靠</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">由七种字牌各一张，外加一种花色的147、另一花色的258、第三种花色的369共九种序数牌中任意七种牌各一张组成的特殊和牌型，计24番。不计全不靠、五门齐，点和不计门前清，自摸不计不求人。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：必须有7个单张的东西南北中发白，加上3种花色，数位按147、258、369中的7张序数牌组成没有将牌的和牌。不计五门齐、不求人、单钓</span><br><br>
  【说明】<br>
  「七星不靠」就是集齐7种字牌的「全不靠」。<br><br>
  【牌例】<br>
  <span>
    <div class="tl-1m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-5z tl-sm"></div>
  </span>(自摸)<br>
  计：七星不靠、自摸
</body>
