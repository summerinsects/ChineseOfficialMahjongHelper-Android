sm"></div><div class="tl-8p tl-sm"></div>&nbsp;<div class="tl-2m tl-sm"></div></span>(自摸)<br>计：门风刻、双暗刻、暗杠、幺九刻、缺一门、自摸<br><br>【牌例4】<br><span><div class="tl-1s tl-sm"></div><div class="tlw"><div class="tl-1s tl-sm tl-ccw"></div></div><div class="tl-1s tl-sm"></div><div class="tl-1s tl-sm"></div>&nbsp;<div class="tl-2s tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div>&nbsp;<div class="tl-2s tl-sm"></div></span>(点和)<br>计：双暗刻、幺九刻&times;2、明杠、缺一门、无字、单钓将</body>
