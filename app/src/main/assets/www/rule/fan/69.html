<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>暗杠</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中杠牌仅有一副且为暗杠，计2番。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：自抓4张相同的牌开杠</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tl-bg tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-bg tl-sm"></div>&nbsp;<div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div>&nbsp;<div class="tl-7m tl-sm"></div>
  </span>(点和)<br>
  计：箭刻、门前清、双暗刻、暗杠<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-bg tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-bg tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-3p tl-sm tl-ccw"></div></div><div class="tl-2p tl-sm"></div><div class="tl-4p tl-sm"></div>&nbsp;<div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div>&nbsp;<div class="tl-5s tl-sm"></div>
  </span>(点和)<br>
  计：箭刻、双暗刻、暗杠、喜相逢、幺九刻<br><br>
  【牌例3】<br>
  <span>
    <div class="tlw"><div class="tl-3p tl-sm tl-ccw"></div></div><div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div>&nbsp;<div class="tl-bg tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-bg tl-sm"></div>&nbsp;<div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div>&nbsp;<div class="tl-8s tl-sm"></div>
  </span>(点和)<br>
  计：暗杠、喜相逢、连六、幺九刻、缺一门、无字、单钓将<br><br>
  【牌例4】<br>
  <span>
    <div class="tlw"><div class="tl-9p tl-sm tl-ccw"></div></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div>&nbsp;<div class="tl-bg tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-bg tl-sm"></div>&nbsp;<div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-4p tl-sm"></div>&nbsp;<div class="tl-3m tl-sm"></div>
  </span>(自摸)<br>
  计：暗杠、连六、幺九刻、缺一门、无字、边张、自摸<br><br>
  【注】<br>
  ① 吃、碰牌后应打牌而不允许立即开杠，明刻加杠、开暗杠只允许在摸牌后进行。<br>
  ② 开杠从牌墙尾部摸牌。<br>
  ③ 暗杠不向对手公示，但本盘结束需公开供对手查验。<br>
  ④ 暗杠不影响门前清。
</body>
