<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>字一色</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">由字牌组成的和牌，计64番。不计混幺九、碰碰和、全带幺、幺九刻。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由字牌的刻子（杠）、将组成的和牌。不计碰碰和</span><br><br>
  【说明】<br>
  本APP将原文定义限定的「刻子」、「将牌」删除，使其能与七对复合。如此修改，「字一色」便不是必然「碰碰和」了，但根据国际麻将联盟（MIL）规则，强制不计「碰碰和」。<br><br>
  【牌例1】西风圈西家：<br>
  <span>
    <div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tlw"><div class="tl-1z tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-2z tl-sm tl-ccw"></div></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div>&nbsp;<div class="tl-6z tl-sm"></div><div class="tlw"><div class="tl-6z tl-sm tl-ccw"></div></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div>&nbsp;<div class="tl-3z tl-sm"></div>
  </span>(自摸)<br>
  计：小四喜、字一色、圈风刻、门风刻、箭刻、自摸<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-5z tl-sm"></div>&nbsp;<div class="tl-5z tl-sm"></div>
  </span>(自摸)<br>
  计：字一色、七对、自摸<br><br>
  <span class="text-secondary fw-light">字一色也是传统番种，常于各种影视作品中出镜，通常都是与大四喜、大三元等牌复合出现。
</body>
