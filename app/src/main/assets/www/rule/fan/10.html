<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>小三元</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有两副箭牌的刻子、第三种箭牌的将牌，计64番。不计双箭刻、箭刻，组成小三元的两副刻子不计幺九刻。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和牌时有箭牌的两副刻子和将牌。不计箭刻</span><br><br>
  【牌例1】<br>
    <span>
      <div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tlw"><div class="tl-7z tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-9s tl-sm tl-cw"></div></div><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div>&nbsp;<div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tl-5z tl-sm"></div>
    </span>(点和)<br>
  计：小三元、幺九刻、缺一门、单钓将<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tlw"><div class="tl-5z tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-7z tl-sm tl-ccw"></div></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-1p tl-sm"></div><div class="tlw"><div class="tl-1p tl-sm tl-ccw"></div></div><div class="tl-1p tl-sm"></div>&nbsp;<div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tl-6z tl-sm"></div>
  </span>(自摸)<br>
  计：小三元、混幺九、混一色、单钓将、自摸<br><br>
  【牌例3】南风圈西家：<br>
  <span>
    <div class="tlw"><div class="tl-1z tl-sm tl-ccw"></div></div><div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div>&nbsp;<div class="tl-5z tl-sm"></div><div class="tlw"><div class="tl-5z tl-sm tl-ccw"></div></div><div class="tl-5z tl-sm"></div>&nbsp;<div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-4z tl-sm"></div>
  </span>(点和)<br>
  计：小三元、字一色<br><br>
  <span class="text-secondary fw-light">小三元也是传统番种，但在各种影视作品中出镜率不算太高，拿到这种牌的人物角色通常都是做大三元。
</body>
