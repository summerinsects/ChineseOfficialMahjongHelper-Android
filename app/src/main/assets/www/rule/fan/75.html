<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><title>幺九刻</title><meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height"><meta name="format-detection" content="telephone=no,email=no,adress=no"><link rel="stylesheet" href="../css/tz-tile.css"><link rel="stylesheet" href="../css/common.css"></head><body><span class="fw-bold">和牌中有幺九牌组成的刻子，每副计1番。</span><br><span class="text-secondary fw-light">《98规则》原文：3张相同的一、九序数牌及字牌组成的刻子（或杠）</span><br><br>【牌例】东风圈南家：<br><span><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tlw"><div class="tl-3z tl-sm tl-cw"></div></div>&nbsp;<div class="tl-4z tl-sm"></div><div class="tlw"><div class="tl-4z tl-sm tl-ccw"></div></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-1p tl-sm tl-ccw"></div></div><div class="tl-1p tl-sm"></div><div class="tl-1p tl-sm"></div>&nbsp;<div class="tl-5m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div>&nbsp;<div class="tl-9s tl-sm"></div></span>(自摸)<br>计：碰碰和、幺九刻&times;4、明杠、自摸<br><br>【注】<br>幺九刻本身不存在算番难点，主要难点在不计或减计幺九刻的场合，归纳如下：<br>① 九莲宝灯不计幺九刻&times;1，和2、5、8的九莲宝灯加计1个幺九刻。<br>② 字一色、清幺九、混幺九不计幺九刻。<br>③ 大四喜、小四喜、三风刻，大三元、小三元、双箭刻、圈风刻、门风刻、箭刻自身的刻子不计幺九刻。除此之外，幺九刻出现则均可计。</body>
