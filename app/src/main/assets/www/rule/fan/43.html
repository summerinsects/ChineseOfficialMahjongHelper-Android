<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>三色三同顺</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有三种花色序数相同的三副顺子，计8番。不计喜相逢。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和牌时，有3种花色3副序数相同的顺子</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-6m tl-sm tl-ccw"></div></div><div class="tl-5m tl-sm"></div><div class="tl-7m tl-sm"></div>&nbsp;<div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div>&nbsp;<div class="tl-7p tl-sm"></div>
  </span>(点和)<br>
  计：三色三同顺、平和<br><br>
  【牌例2】<br>
  <span>
    <div class="tlw"><div class="tl-2m tl-sm tl-ccw"></div></div><div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div>&nbsp;<div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div>&nbsp;<div class="tl-2s tl-sm"></div>
  </span>(点和)<br>
  计：小于五、三色三同顺、平和、一般高
</body>
