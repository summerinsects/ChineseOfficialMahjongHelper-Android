<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>一色四同顺</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有同一种花色四副序数相同的顺子，计48番。不计一色三同顺、一色三节高、七对、四归一、一般高。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：一种花色4副序数相同的顺子，不计一色三节高、一般高、四归一</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-5s tl-sm tl-ccw"></div></div><div class="tl-4s tl-sm"></div><div class="tl-6s tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-6s tl-sm tl-ccw"></div></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-6s tl-sm tl-ccw"></div></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div>&nbsp;<div class="tl-5m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div>&nbsp;<div class="tl-6s tl-sm"></div>
  </span>(自摸)<br>
  计：一色四同顺、全中、全带五、和绝张、平和、缺一门、自摸<br><br>
  【牌例2】<br>
  <span>
    <div class="tlw"><div class="tl-2s tl-sm tl-ccw"></div></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div>&nbsp;<div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tl-2s tl-sm"></div>
  </span>(自摸)<br>
  计：绿一色、一色四同顺、自摸<br><br>
  <span class="text-secondary fw-light">一色四同顺也是传统番种，有雅称「四海一家」，其实际难度远高于单一的任何一种88番，但由于序数牌的视觉效果天然不如字牌震撼，在各种影视作品中出镜较少。
</body>
