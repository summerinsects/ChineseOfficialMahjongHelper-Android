<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>大四喜</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有东、南、西、北四副刻子，计88番。不计三风刻、碰碰和、圈风刻、门风刻、幺九刻。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由4副风刻（杠）组成和和牌。不计圈风刻、门风刻、三风刻、碰碰和</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-1z tl-sm tl-ccw"></div></div><div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div>&nbsp;<div class="tl-2z tl-sm"></div><div class="tlw"><div class="tl-2z tl-sm tl-ccw"></div></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div>&nbsp;<div class="tl-5p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div>&nbsp;<div class="tl-4z tl-sm"></div>
  </span>(自摸)<br>
  计：大四喜、混一色、双暗刻、明杠、自摸<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-3z tl-sm"></div><div class="tlw"><div class="tl-3z tl-sm tl-ccw"></div></div><div class="tl-3z tl-sm"></div>&nbsp;<div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tlw"><div class="tl-4z tl-sm tl-cw"></div></div>&nbsp;<div class="tl-1s tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div>&nbsp;<div class="tl-2z tl-sm"></div>
  </span>(点和)<br>
  计：大四喜、混幺九、混一色<br><br>
  【牌例3】<br>
  <span>
    <div class="tlw"><div class="tl-4z tl-sm tl-ccw"></div></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div>&nbsp;<div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tlw"><div class="tl-1z tl-sm tl-cw"></div></div>&nbsp;<div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tl-3z tl-sm"></div>
  </span>(点和)<br>
  计：大四喜、字一色<br><br>
  <span class="text-secondary fw-light">大四喜是传统番种，常于各种影视作品中出镜。</span>
</body>
