<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><title>平和</title><meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height"><meta name="format-detection" content="telephone=no,email=no,adress=no"><link rel="stylesheet" href="../css/tz-tile.css"><link rel="stylesheet" href="../css/common.css"></head><body><span class="fw-bold">由四副顺子、一对序数牌作将牌的基本和牌型，计2番。不计无字。</span><br><span class="text-secondary fw-light">《98规则》原文：由4副顺子及序数牌作将组成的和牌，边、嵌、钓不影响平和</span><br><br>【说明】<br>国标麻将的平和只需四副顺子及序数牌做将，<span class="bg-info bg-opacity-50">无需听两面</span>，可接受边张、嵌张、单钓将。<br><br>【牌例1】<br><span><div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-7p tl-sm"></div>&nbsp;<div class="tl-6p tl-sm"></div></span>(点和)<br>计：三色三步高、门前清、平和、连六、嵌张<br><br>【牌例2】<br><span><div class="tlw"><div class="tl-3p tl-sm tl-ccw"></div></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div>&nbsp;<div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-8p tl-sm"></div>&nbsp;<div class="tl-7p tl-sm"></div></span>(自摸)<br>计：平和、断幺、喜相逢、连六、嵌张、自摸<br><br>【牌例3】<br><span><div class="tlw"><div class="tl-7m tl-sm tl-ccw"></div></div><div class="tl-8m tl-sm"></div><div class="tl-9m tl-sm"></div>&nbsp;<div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-9s tl-sm"></div>&nbsp;<div class="tl-7s tl-sm"></div></span>(自摸)<br>计：平和、喜相逢、连六、老少副、缺一门、边张、自摸<br><br>【注】<br>新手还需要注意两点：一是「平和」<span class="bg-info bg-opacity-50">不能用字牌作将</span>；二是<span class="bg-info bg-opacity-50">「平和」不计「无字」</span>，算番（尤其是做凑番牌）时不要算多了。</body>
