<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>三色三节高</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有三种花色序数依次递增1的三副刻子，计8番。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和牌时，有3种花色3副依次递增一位数的刻子</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tl-5m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tlw"><div class="tl-5m tl-sm tl-cw"></div></div>&nbsp;<div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div>&nbsp;<div class="tl-7p tl-sm"></div>
  </span>(点和)<br>
  计：三色三节高、无字<br><br>
  【牌例2】<br>
  <span>
    <div class="tlw"><div class="tl-4s tl-sm tl-ccw"></div></div><div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div>&nbsp;<div class="tl-3m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div>&nbsp;<div class="tl-5p tl-sm"></div>
  </span>(自摸)<br>
  计：三暗刻、三色三节高、五门齐、碰碰和、箭刻、自摸
</body>
