<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>断幺</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">由序数牌2、3、4、5、6、7、8组成的和牌，计2番。不计无字。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和牌中没有一、九及字牌</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-3m tl-sm tl-ccw"></div></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div>&nbsp;<div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div>&nbsp;<div class="tl-7s tl-sm"></div>
  </span>(点和)<br>
  计：三色三步高、断幺<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-4m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-2p tl-sm"></div>&nbsp;<div class="tl-8m tl-sm"></div>
  </span>(自摸)<br>
  计：七对、断幺、自摸<br><br>
  【牌例3】<br>
  <span>
    <div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-8p tl-sm"></div>&nbsp;<div class="tl-6m tl-sm"></div>
  </span>(点和)<br>
  计：门前清、平和、断幺、喜相逢、连六<br><br>
  【牌例4】<br>
  <span>
    <div class="tlw"><div class="tl-7m tl-sm tl-ccw"></div></div><div class="tl-6m tl-sm"></div><div class="tl-8m tl-sm"></div>&nbsp;<div class="tl-6p tl-sm"></div><div class="tlw"><div class="tl-6p tl-sm tl-ccw"></div></div><div class="tl-6p tl-sm"></div><div class="tl-6p tl-sm"></div>&nbsp;<div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-5p tl-sm"></div>&nbsp;<div class="tl-4p tl-sm"></div>
  </span>(点和)<br>
  计：断幺、喜相逢、连六、明杠、缺一门、嵌张、自摸
</body>
