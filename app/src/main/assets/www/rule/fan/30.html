<body>
  <span class="fw-bold">由一种花色的123、789两副顺子，外加另一花色的123、789两副顺子以及第三种花色的一对5作将牌组成的基本和牌型，计16番。不计平和、老少副、喜相逢、无字。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：2种花色2个老少副、另一种花色5作将的和牌。不计喜相逢、老少副、无字、平和</span><br><br>
  【牌例】<br>
  <span>
    <div class="tlw"><div class="tl-1m tl-sm tl-ccw"></div></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-8m tl-sm tl-ccw"></div></div><div class="tl-7m tl-sm"></div><div class="tl-9m tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-3p tl-sm tl-ccw"></div></div><div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div>&nbsp;<div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-9p tl-sm"></div>&nbsp;<div class="tl-7p tl-sm"></div>
  </span>(自摸)<br>
  计：三色双龙会、边张、自摸
