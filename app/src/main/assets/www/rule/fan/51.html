<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>混一色</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中包含字牌且序数牌仅有一种花色，计6番。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由一种花色序数牌及字牌组成的和牌</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-6z tl-sm tl-ccw"></div></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-9s tl-sm tl-ccw"></div></div><div class="tl-7s tl-sm"></div><div class="tl-8s tl-sm"></div>&nbsp;<div class="tl-1s tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div>&nbsp;<div class="tl-1s tl-sm"></div>
  </span>(点和)<br>
  计：混一色、箭刻、幺九刻<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tlw"><div class="tl-5z tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-7m tl-sm tl-ccw"></div></div><div class="tl-8m tl-sm"></div><div class="tl-9m tl-sm"></div>&nbsp;<div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div>&nbsp;<div class="tl-6m tl-sm"></div>
  </span>(自摸)<br>
  计：清龙、混一色、箭刻、自摸<br><br>
  【牌例3】<br>
  <span>
    <div class="tl-1p tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-9p tl-sm"></div>
  </span>(点和)<br>
  计：七对、推不倒、混一色、四归一<br><br>
  【注】<br>
  有人主张大四喜、小四喜（以下统称「四喜」）不计「混一色」，理由是四喜至少都是混一色，所以应该不计。<br>
  这种主张是没有根据的。《规则》原文对「混一色」的定义为：<span class="bg-success bg-opacity-25">由一种花色序数牌及字牌组成的和牌</span>，并非「缺少两种花色」。<br>
  因此，不能仿照「缺一门」类似的逻辑推导出由于四喜必然缺少两种花色从而不计「混一色」。
</body>
