<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>清龙</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有同一种花色的123、456、789三副顺子，计16番。不计连六、老少副。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和牌时，有一种花色1~9相连接的序数牌</span><br><br>
  【说明】<br>
  原文定义中1~9相连接的序数牌不严谨，有些人误认为只要手牌包含1~9就是清龙，这显然不符合大众对清龙的认知，本APP明确规定同一种花色的123、456、789三副顺子，消除误解。<br><br>
  【牌例】<br>
  <span>
    <div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-2p tl-sm"></div>&nbsp;<div class="tl-4s tl-sm"></div>
  </span>(自摸)<br>
  计：清龙、不求人、平和、一般高、缺一门
</body>
