<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><title>明杠</title><meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height"><meta name="format-detection" content="telephone=no,email=no,adress=no"><link rel="stylesheet" href="../css/tz-tile.css"><link rel="stylesheet" href="../css/common.css"></head><body><span class="fw-bold">手中有暗刻，他家打出一张与之相同的牌开杠，或者有碰出的刻子，摸进一张与之相同的牌开杠，计1番。其中，前一种称为「直杠」或「大明杠」；后一种称为「加杠」。</span><br><span class="text-secondary fw-light">《98规则》原文：自己有暗刻，碰别人打出的一张相同的牌开杠；或自己抓进一张与碰的明刻相同的牌开杠</span><br><br>【牌例】<br><span><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tlw"><div class="tl-9s tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-1p tl-sm tl-ccw"></div></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-5s tl-sm tl-ccw"></div></div><div class="tl-4s tl-sm"></div><div class="tl-6s tl-sm"></div>&nbsp;<div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-6p tl-sm"></div>&nbsp;<div class="tl-5p tl-sm"></div></span>(自摸)<br>计：喜相逢、连六、幺九刻、明杠、缺一门、无字、嵌张、自摸<br><br>【注】<br>① 吃、碰牌后应打牌而不允许立即开杠，明刻加杠、开暗杠只允许在摸牌后进行。<br>② 开杠从牌墙尾部摸牌。<br>③ 有明杠不再计门前清。</body>
