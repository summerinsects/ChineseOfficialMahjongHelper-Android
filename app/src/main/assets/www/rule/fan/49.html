<body>
  <span class="fw-bold">和他家明刻加杠的牌，计8番。不计和绝张。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和别人自抓开明杠的牌。不计和绝张</span><br><br>
  【说明】<br>
  只有先碰出明刻再加杠的那张牌才能被抢杠。手中暗刻别人打出第四张开杠的，不能抢杠，此时如果能和则可以报和，但不是抢杠和，因为和牌比杠牌优先。
