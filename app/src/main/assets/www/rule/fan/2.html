<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>大三元</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有中、发、白三副刻子，计88番。不计双箭刻、箭刻，组成大三元的三副刻子不计幺九刻。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和牌中，有中发白3副刻子。不计箭刻</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tl-7z tl-sm"></div><div class="tlw"><div class="tl-7z tl-sm tl-ccw"></div></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tlw"><div class="tl-6z tl-sm tl-cw"></div></div>&nbsp;<div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div>&nbsp;<div class="tl-5z tl-sm"></div>
  </span>(自摸)<br>
  计：大三元、碰碰和、混一色、双暗刻、幺九刻、自摸<br><br>
  【牌例2】<br>
  <span>
    <div class="tlw"><div class="tl-5z tl-sm tl-ccw"></div></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div>&nbsp;<div class="tl-bg tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-bg tl-sm"></div>&nbsp;<div class="tl-9m tl-sm"></div><div class="tlw"><div class="tl-9m tl-sm tl-ccw"></div></div><div class="tl-9m tl-sm"></div>&nbsp;<div class="tl-1p tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-7z tl-sm"></div>
  </span>(点和)<br>
  计：大三元、混幺九、暗杠、缺一门<br><br>
  【牌例3】东风圈西家：<br>
  <span>
    <div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tlw"><div class="tl-6z tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-1z tl-sm tl-ccw"></div></div><div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div>&nbsp;<div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-7z tl-sm"></div>
  </span>(点和)<br>
  计：大三元、字一色、圈风刻<br><br>
  <span class="text-secondary fw-light">大三元也是传统番种，常于各种影视作品中出镜。</span>
</body>
