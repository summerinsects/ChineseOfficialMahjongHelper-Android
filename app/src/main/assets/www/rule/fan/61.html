<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>箭刻</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中箭牌刻子仅有一副，计2番。这副刻子不计幺九刻。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由中、发、白3张相同的牌组成的刻子</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tl-7z tl-sm"></div><div class="tlw"><div class="tl-7z tl-sm tl-ccw"></div></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-9m tl-sm tl-ccw"></div></div><div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div>&nbsp;<div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div>&nbsp;<div class="tl-5s tl-sm"></div>
  </span>(点和)<br>
  计：五门齐、箭刻<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-3m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div>&nbsp;<div class="tl-7m tl-sm"></div>
  </span>(点和)<br>
  计：箭刻、门前清、喜相逢、连六、缺一门、嵌张<br><br>
  【牌例3】<br>
  <span>
    <div class="tl-6z tl-sm"></div><div class="tlw"><div class="tl-6z tl-sm tl-ccw"></div></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-7s tl-sm tl-ccw"></div></div><div class="tl-8s tl-sm"></div><div class="tl-9s tl-sm"></div>&nbsp;<div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div>&nbsp;<div class="tl-3s tl-sm"></div>
  </span>(自摸)<br>
  计：箭刻、喜相逢、老少副、明杠、缺一门、边张、自摸
</body>
