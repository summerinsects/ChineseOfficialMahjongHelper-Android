<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>三暗刻</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中暗刻仅有三副，计16番。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：3个暗刻</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tl-4m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tl-7s tl-sm"></div>
  </span>(自摸)<br>
  计：三暗刻、不求人、箭刻<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-8p tl-sm"></div>&nbsp;<div class="tl-6m tl-sm"></div>
  </span>(点和)<br>
  计：三暗刻、门前清、四归一、无字<br><br>
  【牌例3】<br>
  <span>
    <div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-7p tl-sm"></div>&nbsp;<div class="tl-7p tl-sm"></div>
  </span>(点和)<br>
  计：三暗刻、碰碰和、门前清、断幺、缺一门
</body>
