<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>连七对</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">

<body>
  <span class="fw-bold">由一种花色的七个序数相连的对子组成的特殊和牌型，计88番。不计七对、清一色、无字、单钓将，点和不计门前清，自摸不计不求人。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由一种花色序数牌组成序数相连的7个对子的和牌。不计清一色、不求人、单钓</span><br><br>
  【牌例】<br>
  <span>
    <div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div>&nbsp;<div class="tl-4s tl-sm"></div>
  </span>(点和)<br>
  计：连七对、断幺<br><br>
  <span class="text-secondary fw-light">连七对也是传统番种，但由于序数牌的视觉效果天然不如字牌震撼，在各种影视作品中出镜率不太高。
</body>
