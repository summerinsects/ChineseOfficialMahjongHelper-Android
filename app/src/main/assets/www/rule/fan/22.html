<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>全双刻</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">由序数牌2、4、6、8的刻子、将牌组成的基本和牌型，计24番。不计碰碰和、断幺、无字。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由2、4、6、8序数牌的刻子、将牌组成的和牌。不计碰碰和、断幺</span><br><br>
  【说明】<br>
  「全双刻」要求「刻」，不接受七对。对于由双数牌构成的七对，只计七对+断幺。<br><br>
  【牌例】<br>
  <span>
    <div class="tl-4m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tlw"><div class="tl-4m tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-6m tl-sm tl-ccw"></div></div><div class="tl-6m tl-sm"></div><div class="tl-6m tl-sm"></div>&nbsp;<div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-8p tl-sm"></div>&nbsp;<div class="tl-4s tl-sm"></div>
  </span>(点和)<br>
  计：全双刻、双同刻
</body>
