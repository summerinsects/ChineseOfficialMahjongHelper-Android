<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>绿一色</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">

<body>
  <span class="fw-bold">由「23468条」及「发」六种牌组成的和牌，计88番。不计混一色。如无「发」，可计清一色。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由23468条及发字中的任何牌组成的顺子、刻子、将的和牌。不计混一色。如无「发」字组成的和牌，可计清一色</span><br><br>
  【说明】<br>
  本APP将原文定义限定的「顺子」、「刻子」、「将牌」删除，使其能与七对复合。<br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-3s tl-sm tl-ccw"></div></div><div class="tl-2s tl-sm"></div><div class="tl-4s tl-sm"></div>&nbsp;<div class="tl-6s tl-sm"></div><div class="tlw"><div class="tl-6s tl-sm tl-ccw"></div></div><div class="tl-6s tl-sm"></div>&nbsp;<div class="tl-3s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tl-6z tl-sm"></div>
  </span>(自摸)<br>
  计：绿一色、双暗刻、箭刻、自摸<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div>&nbsp;<div class="tl-8s tl-sm"></div>
  </span>(点和)<br>
  计：绿一色、清一色、七对、断幺、四归一&times;2
</body>
