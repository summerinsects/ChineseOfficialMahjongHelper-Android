<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><title>小四喜</title><meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height"><meta name="format-detection" content="telephone=no,email=no,adress=no"><link rel="stylesheet" href="../css/tz-tile.css"><link rel="stylesheet" href="../css/common.css"></head><body><span class="fw-bold">和牌中有三副风牌的刻子、第四种风牌的将牌，计64番。不计三风刻、幺九刻。</span><br><span class="text-secondary fw-light">《98规则》原文：和牌时有风牌的3副刻子及将牌。不计三风刻</span><br><br>【牌例1】南风圈北家：<br><span><div class="tl-1z tl-sm"></div><div class="tlw"><div class="tl-1z tl-sm tl-ccw"></div></div><div class="tl-1z tl-sm"></div>&nbsp;<div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tlw"><div class="tl-2z tl-sm tl-cw"></div></div>&nbsp;<div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div>&nbsp;<div class="tl-1p tl-sm"></div></span>(自摸)<br>计：小四喜、混一色、全带幺、圈风刻、自摸<br><br>【牌例2】西风圈南家：<br><span><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tlw"><div class="tl-4z tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-1z tl-sm tl-ccw"></div></div><div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div>&nbsp;<div class="tl-1s tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div>&nbsp;<div class="tl-1s tl-sm"></div></span>(点和)<br>计：小四喜、混幺九、混一色、门风刻<br><br>【牌例3】东风圈东家：<br><span><div class="tlw"><div class="tl-4z tl-sm tl-ccw"></div></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div>&nbsp;<div class="tl-3z tl-sm"></div><div class="tlw"><div class="tl-3z tl-sm tl-ccw"></div></div><div class="tl-3z tl-sm"></div>&nbsp;<div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-6z tl-sm"></div><div class="tl-6z tl-sm"></div>&nbsp;<div class="tl-6z tl-sm"></div></span>(点和)<br>计：小四喜、字一色、箭刻<br><br><span class="text-secondary fw-light">小四喜也是传统番种，但在各种影视作品中出镜率不算太高，拿到这种牌的人物角色通常都是做大四喜。</body>
