<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><title>花牌</title><meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height"><meta name="format-detection" content="telephone=no,email=no,adress=no"><link rel="stylesheet" href="../css/tz-tile.css"><link rel="stylesheet" href="../css/common.css"></head><body><span class="fw-bold">每花计1番。不计在起和番内，和牌后才能计番。花牌补花成和计自摸，不计杠上开花。</span><br><span class="text-secondary fw-light">《98规则》原文：即春夏秋冬、梅兰竹菊，每花计一分。不计在起和分内，和牌后才能计分。花牌补花成和计自摸分，不计杠上开花</span><br><br>【说明】<br>① 《规则》原文对花牌的行牌规范未做详细说明，在国标麻将实际对局中只有摸牌以后才能补花，吃、碰后不能补花。<br>② 花牌可以连续补、缓补、不补打出。<br>③ 补花从牌墙尾部摸牌。<br><br>【牌例】略。</body>
