<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><title>花龙</title><meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height"><meta name="format-detection" content="telephone=no,email=no,adress=no"><link rel="stylesheet" href="../css/tz-tile.css"><link rel="stylesheet" href="../css/common.css"></head><body><span class="fw-bold">和牌中有一种花色的123、另一种花色的456、第三种花色的789三副顺子，计8番。</span><br><span class="text-secondary fw-light">《98规则》原文：3种花色的3副顺子连接成1~9的序数牌</span><br><br>【牌例1】<br><span><div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div>&nbsp;<div class="tl-9s tl-sm"></div></span>(点和)<br>计：花龙、门前清、平和、喜相逢<br><br>【牌例2】<br><span><div class="tlw"><div class="tl-5s tl-sm tl-ccw"></div></div><div class="tl-4s tl-sm"></div><div class="tl-6s tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-5p tl-sm tl-ccw"></div></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div>&nbsp;<div class="tl-6m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div>&nbsp;<div class="tl-9m tl-sm"></div></span>(点和)<br>计：花龙、平和<br><br>【牌例3】<br><span><div class="tl-8p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tlw"><div class="tl-8p tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-7m tl-sm tl-ccw"></div></div><div class="tl-8m tl-sm"></div><div class="tl-9m tl-sm"></div>&nbsp;<div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-6p tl-sm"></div></span>(点和)<br>计：花龙<br><br>【注】<br>牌例1中<div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div>与<div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div>满足连六定义，与<div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div>满足喜相逢定义，由于<div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div>、<div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div>已经进行过计番，根据套算一次原则，连六、喜相逢只能选择一组计番。<br><br><span class="text-secondary fw-light">特别的，在本APP上，花龙以外的第四副顺子只可能计喜相逢或者一般高，不可能计连六或者老少副，请读者结合后文自行思考其中原因。</span></body>
