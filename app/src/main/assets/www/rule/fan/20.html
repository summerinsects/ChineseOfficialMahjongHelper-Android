<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>七对</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">由七个对子组成的特殊和牌型，计24番。点和不计门前清，自摸不计不求人。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由7个对子组成的和牌。不计不求人、单钓</span><br><br>
  【说明】<br>
  七对是一种特殊和牌型，不应把对子视作「将」，所以不存在单钓将的问题。<br><br>
  【牌例1】<br>
  <span>
    <div class="tl-3m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div>&nbsp;<div class="tl-5p tl-sm"></div>
  </span>(自摸)<br>
  计：七对、自摸<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-4z tl-sm"></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-7z tl-sm"></div>
  </span>(点和)<br>
  计：混幺九、七对、五门齐、四归一<br><br>
  【注】<br>
  七对可附加的番种有：绿一色、字一色、清幺九、混幺九、清一色、全大、全中、全小、大于五、小于五、推不倒、妙手回春、海底捞月、五门齐、混一色、四归一、断幺、无字、缺一门、自摸、花牌。
</body>
