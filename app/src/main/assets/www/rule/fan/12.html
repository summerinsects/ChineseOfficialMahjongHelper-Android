<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>四暗刻</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有四副暗刻，计64番。不计碰碰和，点和不计门前清，自摸不计不求人。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：4个暗刻（暗杠）。不计门前清、碰碰和</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-5p tl-sm"></div>&nbsp;<div class="tl-5p tl-sm"></div>
  </span>(点和)<br>
  计：四暗刻、双同刻、幺九刻、无字、单钓将<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div>&nbsp;<div class="tl-1p tl-sm"></div>
  </span>(自摸)<br>
  计：四暗刻、双同刻、幺九刻&times;3、缺一门、无字、自摸<br><br>
  <span class="text-secondary fw-light">四暗刻也是传统番种，常于各种影视作品中出镜，通常都是以四个暗杠的形式与大四喜、大三元等牌复合出现。
</body>
