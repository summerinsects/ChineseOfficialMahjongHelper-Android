<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><title>一色四步高</title><meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height"><meta name="format-detection" content="telephone=no,email=no,adress=no"><link rel="stylesheet" href="../css/tz-tile.css"><link rel="stylesheet" href="../css/common.css"></head><body><span class="fw-bold">同一种花色四副依次递增1或2的顺子，计32番。不计一色三步高、连六、老少副。本APP用后缀①②表示区分。</span><br><span class="text-secondary fw-light">《98规则》原文：一种花色4副依次递增一位数或依次递增二位数的顺子</span><br><br>【牌例1】<br><span><div class="tlw"><div class="tl-3m tl-sm tl-ccw"></div></div><div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-4m tl-sm tl-ccw"></div></div><div class="tl-3m tl-sm"></div><div class="tl-5m tl-sm"></div>&nbsp;<div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-9m tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div>&nbsp;<div class="tl-5m tl-sm"></div></span>(自摸)<br>计：一色四步高②、混一色、自摸<br><br>【牌例2】<br><span><div class="tlw"><div class="tl-1p tl-sm tl-ccw"></div></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-3p tl-sm tl-ccw"></div></div><div class="tl-2p tl-sm"></div><div class="tl-4p tl-sm"></div>&nbsp;<div class="tl-9s tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div>&nbsp;<div class="tl-9s tl-sm"></div></span>(点和)<br>计：一色四步高①、平和、缺一门、单钓将<br><br>【注】<br>根据「<span>不拆移原则</span>」，递增1的不计连六；递增2的不计老少副。</body>
