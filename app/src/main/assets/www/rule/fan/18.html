<!DOCTYPE html><html lang="zh-Hans"><head><meta charset="utf-8"><title>三杠</title><meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height"><meta name="format-detection" content="telephone=no,email=no,adress=no"><link rel="stylesheet" href="../css/tz-tile.css"><link rel="stylesheet" href="../css/common.css"></head><body><span class="fw-bold">和牌中杠牌仅有三副，计32番。</span><br><span class="text-secondary fw-light">《98规则》原文：3个杠</span><br><br>【说明】<br>对于三杠中出现的暗杠，根据国际麻将联盟（MIL）规则，杠系列和暗刻系列最多各取一个番种计分，如下表：<br><table class="table" style="width:auto;"><tr><th>暗杠数目</th><th>第四副为顺子/明刻</th><th>第四副为暗刻</th></tr><tr><td>0</td><td>三杠</td><td>三杠</td></tr><tr><td>1</td><td>三杠</td><td>三杠+双暗刻</td></tr><tr><td>2</td><td>三杠+双暗刻</td><td>三杠+三暗刻</td></tr><tr><td>3</td><td>三杠+三暗刻</td><td>三杠+四暗刻</td></tr></table>【牌例】略。</body>
