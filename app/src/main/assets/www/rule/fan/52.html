<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>三色三步高</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有三种花色序数依次递增1的三副顺子，计6番。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：3种花色3副依次递增一位序数的顺子</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-2p tl-sm tl-ccw"></div></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div>&nbsp;<div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-7p tl-sm"></div>&nbsp;<div class="tl-1m tl-sm"></div>
  </span>(点和)<br>
  计：三色三步高、平和<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-bg tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-5z tl-sm"></div><div class="tl-bg tl-sm"></div>&nbsp;<div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-2z tl-sm"></div><div class="tl-2z tl-sm"></div>&nbsp;<div class="tl-7s tl-sm"></div>
  </span>(点和)<br>
  计：三色三步高、五门齐、箭刻、门前清、暗杠、嵌张<br><br>
  【注】<br>
  与「一色三步高」不同的是，「三色三步高」<span class="bg-info bg-opacity-50">不接受递增2</span>，也就是说，<div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div>&#160;<div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div>&#160;<div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div>这样的牌型并不是三色三步高，这是新手一定要注意的。
</body>
