<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>一色三节高</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有同一种花色的三副序数依次递增1的刻子，计24番。不计一色三同顺。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和牌时有一种花色3副依次递增一位数的刻子。不计一色三同顺</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tl-6p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tlw"><div class="tl-6p tl-sm tl-cw"></div></div>&nbsp;<div class="tl-6s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-8s tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div>&nbsp;<div class="tl-7p tl-sm"></div>
  </span>(点和)<br>
  计：一色三节高、缺一门<br><br>
  【牌例2】<br>
  <span>
    <div class="tlw"><div class="tl-3s tl-sm tl-ccw"></div></div><div class="tl-2s tl-sm"></div><div class="tl-4s tl-sm"></div>&nbsp;<div class="tl-1m tl-sm"></div><div class="tl-1m tl-sm"></div><div class="tlw"><div class="tl-1m tl-sm tl-cw"></div></div>&nbsp;<div class="tl-2m tl-sm"></div><div class="tlw"><div class="tl-2m tl-sm tl-ccw"></div></div><div class="tl-2m tl-sm"></div>&nbsp;<div class="tl-3m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-1s tl-sm"></div>&nbsp;<div class="tl-3m tl-sm"></div>
  </span>(自摸)<br>
  计：一色三节高、小于五、幺九刻、缺一门、自摸
</body>
