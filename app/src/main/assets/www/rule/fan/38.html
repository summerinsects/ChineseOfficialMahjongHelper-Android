<body>
  <span class="fw-bold">由序数牌6、7、8、9组成的和牌，计12番。不计无字。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：由序数牌6~9的顺子、刻子、将牌组成的和牌。不计无字</span><br><br>
  【说明】<br>
  本APP将原文定义限定的「顺子」、「刻子」、「将牌」删除，使其能与七对复合。<br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-6p tl-sm tl-ccw"></div></div><div class="tl-7p tl-sm"></div><div class="tl-8p tl-sm"></div>&nbsp;<div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-9m tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-7s tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div><div class="tl-9p tl-sm"></div>&nbsp;<div class="tl-6s tl-sm"></div>
  </span>(点和)<br>
  计：大于五、双暗刻、幺九刻<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-6m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tlw"><div class="tl-6m tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-7m tl-sm tl-ccw"></div></div><div class="tl-7m tl-sm"></div><div class="tl-7m tl-sm"></div>&nbsp;<div class="tl-9m tl-sm"></div><div class="tlw"><div class="tl-9m tl-sm tl-ccw"></div></div><div class="tl-9m tl-sm"></div>&nbsp;<div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-8m tl-sm"></div>&nbsp;<div class="tl-6m tl-sm"></div>
  </span>(点和)<br>
  计：清一色、大于五、和绝张、四归一&times;2、幺九刻
</body>
