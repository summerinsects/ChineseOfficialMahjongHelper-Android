  <span class="fw-bold">和牌中风牌的刻子仅有三副且将牌不为第四种风牌，计12番。组成三风刻的三副刻子不计幺九刻。</span><br>

  <span>

  </span>(自摸)<br>
  计：三风刻、缺一门、自摸<br><br>
  【牌例2】北风圈北家：<br>
  <span>
    <div class="tlw"><div class="tl-1z tl-sm tl-ccw"></div></div><div class="tl-1z tl-sm"></div><div class="tl-1z tl-sm"></div>&nbsp;<div class="tl-2z tl-sm"></div><div class="tlw"><div class="tl-2z tl-sm tl-ccw"></div></div><div class="tl-2z tl-sm"></div>&nbsp;<div class="tl-9m tl-sm"></div><div class="tl-9m tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div>&nbsp;<div class="tl-9m tl-sm"></div>
  </span>(自摸)<br>
