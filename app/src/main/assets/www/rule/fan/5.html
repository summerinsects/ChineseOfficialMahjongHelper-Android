<body>
  <span class="fw-bold">和牌中有四副杠牌，计88番（暗杠加计暗刻番）。不计碰碰和、单钓将。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：4个杠</span><br><br>
  【说明】<br>
  对于四杠中出现的暗杠，根据国际麻将联盟（MIL）规则，杠系列和暗刻系列最多各取一个番种计分，如下表：<br>
  <table class="table" style="width:auto;">
    <tr>
      <th>暗杠数目</th><th>计番</th>
    </tr>
    <tr>
      <td>0</td><td>四杠</td>
    </tr>
    <tr>
      <td>1</td><td>四杠</td>
    </tr>
    <tr>
      <td>2</td><td>四杠+双暗刻</td>
    </tr>
    <tr>
      <td>3</td><td>四杠+三暗刻</td>
    </tr>
    <tr>
      <td>4</td><td>四杠+四暗刻</td>
    </tr>
  </table>
  【牌例】略。<br><br>
  <span class="text-secondary fw-light">四杠也是传统番种，常于各种影视作品中出镜。因其和牌后，整个手牌一共是十八张牌，故又有雅称「十八学士」、「十八罗汉」。</span>
</body>
