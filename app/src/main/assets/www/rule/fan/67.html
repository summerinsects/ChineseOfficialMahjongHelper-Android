<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>双同刻</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">和牌中有两种花色序数相同的两副刻子，计2番，可复计。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：2副序数相同的刻子</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-3m tl-sm tl-ccw"></div></div><div class="tl-2m tl-sm"></div><div class="tl-4m tl-sm"></div>&nbsp;<div class="tl-5m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tlw"><div class="tl-5m tl-sm tl-cw"></div></div>&nbsp;<div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div>&nbsp;<div class="tl-6s tl-sm"></div>
  </span>(点和)<br>
  计：双同刻、四归一、断幺、缺一门、连六<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-9p tl-sm"></div><div class="tlw"><div class="tl-9p tl-sm tl-ccw"></div></div><div class="tl-9p tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-9s tl-sm tl-ccw"></div></div><div class="tl-9s tl-sm"></div><div class="tl-9s tl-sm"></div>&nbsp;<div class="tl-3s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div>&nbsp;<div class="tl-4s tl-sm"></div>
  </span>(点和)<br>
  计：双同刻、喜相逢、幺九刻&times;2、缺一门、无字、嵌张<br><br>
  【牌例3】<br>
  <span>
    <div class="tl-2m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tlw"><div class="tl-2m tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-5p tl-sm tl-ccw"></div></div><div class="tl-5p tl-sm"></div><div class="tl-5p tl-sm"></div>&nbsp;<div class="tl-8m tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-5s tl-sm"></div>&nbsp;<div class="tl-8m tl-sm"></div>
  </span>(点和)<br>
  计：碰碰和、断幺、双同刻&times;2、双暗刻、单钓将<br><br>
  【牌例4】<br>
  <span>
    <div class="tlw"><div class="tl-7s tl-sm tl-ccw"></div></div><div class="tl-7s tl-sm"></div><div class="tl-7s tl-sm"></div>&nbsp;<div class="tl-7m tl-sm"></div><div class="tlw"><div class="tl-7m tl-sm tl-ccw"></div></div><div class="tl-7m tl-sm"></div><div class="tl-7m tl-sm"></div>&nbsp;<div class="tl-1m tl-sm"></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-6s tl-sm"></div>&nbsp;<div class="tl-6s tl-sm"></div>
  </span>(自摸)<br>
  计：双同刻、喜相逢、明杠、缺一门、无字、单钓将、自摸
</body>
