<body>
  <span class="fw-bold">基本和牌型未吃、碰、明杠，和他家打出的牌，计2番。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：没有吃、碰、明杠，和别人打出的牌</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div>&nbsp;<div class="tl-8p tl-sm"></div>
  </span>(点和)<br>
  计：门前清、平和、断幺、连六&times;2<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-3m tl-sm"></div><div class="tl-3m tl-sm"></div><div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div>&nbsp;<div class="tl-3s tl-sm"></div>
  </span>(点和)<br>
  计：门前清、平和、喜相逢&times;2、连六、边张<br><br>
  【牌例3】<br>
  <span>
    <div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-9m tl-sm"></div><div class="tl-9m tl-sm"></div><div class="tl-9m tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div><div class="tl-5p tl-sm"></div>&nbsp;<div class="tl-4p tl-sm"></div>
  </span>(点和)<br>
  计：门前清、喜相逢、连六、幺九刻、缺一门、无字、嵌张
