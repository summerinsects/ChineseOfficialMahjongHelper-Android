<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>无番和</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="fw-bold">不满足除无番和、花牌两个番种外任何番种定义的基本和牌型，计8番。</span><br>
  <span class="text-secondary fw-light">《98规则》原文：和牌后，数不出任何番种分（花牌不计算在内）</span><br><br>
  【牌例1】<br>
  <span>
    <div class="tlw"><div class="tl-1m tl-sm tl-ccw"></div></div><div class="tl-2m tl-sm"></div><div class="tl-3m tl-sm"></div>&nbsp;<div class="tlw"><div class="tl-3m tl-sm tl-ccw"></div></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div>&nbsp;<div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-3z tl-sm"></div><div class="tl-3z tl-sm"></div>&nbsp;<div class="tl-7s tl-sm"></div>
  </span>(点和)<br>
  计：无番和<br><br>
  【牌例2】<br>
  <span>
    <div class="tl-8p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tlw"><div class="tl-8p tl-sm tl-cw"></div></div>&nbsp;<div class="tlw"><div class="tl-7m tl-sm tl-ccw"></div></div><div class="tl-8m tl-sm"></div><div class="tl-9m tl-sm"></div>&nbsp;<div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div><div class="tl-7z tl-sm"></div><div class="tl-7z tl-sm"></div>&nbsp;<div class="tl-3p tl-sm"></div>
  </span>(点和)<br>
  计：无番和
</body>
