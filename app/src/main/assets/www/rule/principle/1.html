<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <title>不拆移原则</title>
  <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width,height=device-height">
  <meta name="format-detection" content="telephone=no,email=no,adress=no">
  <link rel="stylesheet" href="../css/tz-tile.css">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <span class="text-secondary fw-light">《98规则》原文：</span><span class="fw-bold">确定一个番种后，不能将其自身再拆开互相组成新的番种计分。</span><br><br>
  【牌例1】<br>
  <div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div>&nbsp;<div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div>&nbsp;<div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div>&nbsp;<div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div><br>
  这是由<div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div>、<div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div>、<div class="tl-3s tl-sm"></div><div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div>、<div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div>组成的一色四步高①，不允许将一色四步高①自身的<div class="tl-1s tl-sm"></div><div class="tl-2s tl-sm"></div><div class="tl-3s tl-sm"></div>与<div class="tl-4s tl-sm"></div><div class="tl-5s tl-sm"></div><div class="tl-6s tl-sm"></div>再组成连六。<br><br>
  【牌例2】<br>
  <div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div>&nbsp;<div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div>&nbsp;<div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div>&nbsp;<div class="tl-7p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-9p tl-sm"></div><br>
  这是由<div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div>、<div class="tl-3p tl-sm"></div><div class="tl-4p tl-sm"></div><div class="tl-5p tl-sm"></div>、<div class="tl-5p tl-sm"></div><div class="tl-6p tl-sm"></div><div class="tl-7p tl-sm"></div>、<div class="tl-7p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-9p tl-sm"></div>组成的一色四步高②，不允许将一色四步高②自身的<div class="tl-1p tl-sm"></div><div class="tl-2p tl-sm"></div><div class="tl-3p tl-sm"></div>与<div class="tl-7p tl-sm"></div><div class="tl-8p tl-sm"></div><div class="tl-9p tl-sm"></div>再组成老少副。<br><br>
  【牌例3】<br>
  <div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div>&nbsp;<div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div>&nbsp;<div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div>&nbsp;<div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-9m tl-sm"></div><br>
  在用<div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div>、<div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div>、<div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div>组成一色三步高①后，不允许将一色三步高①的<div class="tl-3m tl-sm"></div><div class="tl-4m tl-sm"></div><div class="tl-5m tl-sm"></div>、<div class="tl-5m tl-sm"></div><div class="tl-6m tl-sm"></div><div class="tl-7m tl-sm"></div>拆出来与<div class="tl-7m tl-sm"></div><div class="tl-8m tl-sm"></div><div class="tl-9m tl-sm"></div>再组成一色三步高②。
</body>
