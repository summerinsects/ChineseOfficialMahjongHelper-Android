  <span class="text-secondary fw-light">《98规则》原文：</span><span class="fw-bold">当<span class="bg-info bg-opacity-50">某个</span>番种，由于组牌条件所决定，在其成立的同时，<span class="bg-info bg-opacity-50">必然</span>并存着其他番种，则其他番种不重复计分。</span><br><br>
  「不重复原则」俗称「必然不计」。该原则的<span class="bg-info bg-opacity-50">适用范围是单个番种</span>与其他番种的必然包含关系，<span class="bg-info bg-opacity-50">不能搞长臂管辖上升至某几个番种</span>同时出现时与其他番种的包含关系。<br>
  比如「绿一色」与「清一色」同时出现时，必然「断幺」；「小四喜」与「箭刻」同时出现时，必然「字一色」，等等，这些由几个番种组合产生的必然，都应加计。
